# Plex Live Scan - Agent Configuration

receiver:
  url: "http://10.1.1.193:7077"
  secret: "caring-armand-beings-cosby-SHELVES"

# How many seconds to wait before sending a notification for the same folder.
# Prevents flooding when many files are added at once (e.g. a full season).
debounce_seconds: 5

# File/folder name patterns to ignore
ignore_patterns:
  - ".tmp"
  - ".part"
  - "~"
  - ".DS_Store"
  - "@eaDir"
