services:
  plex-agent:
    image: python:3.12-slim
    container_name: plex-live-scan-agent
    restart: unless-stopped
    volumes:
      - ./app:/app                        # Source files (agent.py, requirements.txt)
      - ./config:/config                  # Contains config.yaml
      - /volume1/TV Shows 5:/volume1/TV Shows 5:ro # Your media folders (read-only)
      - /volume3/TV Shows 6:/volume3/TV Shows 6:ro # Your media folders (read-only)
      - /volume4/TV Shows 7:/volume4/TV Shows 7:ro # Your media folders (read-only)
      - /volume1/Movies 5:/volume1/Movies 5:ro # Your media folders (read-only)
      - /volume3/Movies 6:/volume3/Movies 6:ro # Your media folders (read-only)
      - /volume4/Movies 7:/volume4/Movies 7:ro # Your media folders (read-only)
    working_dir: /app
    command: >
      bash -c "pip install -q -r requirements.txt && python agent.py"
    environment:
      - CONFIG_PATH=/config/config.yaml
